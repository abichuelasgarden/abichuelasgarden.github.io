<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 0 5%; color: #111; }
    
    /* Cabecera Centrada */
    header.site-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 40px 0;
      border: none;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: lowercase;
      letter-spacing: -1px;
      text-decoration: none;
      color: #111;
    }

    nav.site-nav {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav.site-nav a {
      text-transform: lowercase;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      color: #555;
    }

    /* Estilos de la Bienvenida */
    .grid-welcome { display: flex; flex-wrap: wrap; align-items: center; gap: 40px; margin: 40px 0; }
    .welcome-text { flex: 0.8; min-width: 300px; font-size: 25px; font-weight: 700; line-height: 1.1; max-width: 400px; }
    .welcome-photo-container { flex: 1.2; }
    .welcome-photo { width: 100%; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        /* Estilo de Tarjetas Minimalistas */
    .grid-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
        margin-top: 40px;
    }

    .card {
        text-decoration: none;
        color: #111;
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 20px;
        background-color: #f5f5f5; /* Color gris nube por si no hay foto */
        margin-bottom: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .card-date {
        font-size: 0.8rem;
        color: #888;
        text-transform: lowercase;
        display: block;
        margin-bottom: 5px;
    }

    .card-title {
        font-size: 1.2rem;
        font-weight: 700;
        line-height: 1.2;
        text-transform: lowercase;
        margin: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/blog/' | relative_url }}">blog</a>
      <a href="{{ '/recursos/' | relative_url }}">recursos</a>
      <a href="{{ '/galeria/' | relative_url }}">galería</a>
      <a href="{{ '/didacticos/' | relative_url }}">didácticos</a>
      <a href="{{ '/radiocumulus/' | relative_url }}">radiocumulus</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
