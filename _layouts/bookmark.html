---
layout: default
---
<div class="video-bookmark">
  <div class="video-preview">
    <img src="{{ page.thumbnail }}" alt="Portada">
  </div>
  <div class="video-info">
    <span class="tag">RADIO CUMULUS</span>
    <h2>{{ page.title }}</h2>
    <div class="video-description">
      {{ content }}
    </div>
    <a href="{{ page.youtube_url }}" class="btn-yt">Ver en YouTube →</a>
  </div>
</div>

<style>
.video-bookmark {
  display: flex;
  border: 1px solid #D6CDBA;
  border-radius: 12px;
  background: white;
  overflow: hidden;
  margin: 20px 0;
}
.video-preview { width: 30%; }
.video-preview img { width: 100%; height: 100%; object-fit: cover; }
.video-info { padding: 20px; width: 70%; }
.tag { color: #C87459; font-size: 0.7em; font-weight: bold; letter-spacing: 1px; }
.btn-yt { color: #514E94; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; }
</style>
