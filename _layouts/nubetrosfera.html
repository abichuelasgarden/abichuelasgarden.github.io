---
layout: default
---
<article class="scientific-article">
  <header>
    <span class="science-tag">DIVULGACIÓN ATMOSFÉRICA</span>
    <h1>{{ page.title }}</h1>
    <p class="author-line">Por: {{ site.author }} | {{ page.date | date: "%B, %Y" }}</p>
  </header>

  <div class="article-body">
    {{ content }}
  </div>

  <footer class="article-footer">
    <p>Categoría: {{ page.category }}</p>
    <p><i>Este post es parte del proyecto Nubetrosfera.</i></p>
  </footer>
</article>

<style>
.scientific-article { max-width: 700px; margin: 0 auto; line-height: 1.8; }
.science-tag { color: #514E94; font-size: 0.8em; border-left: 3px solid #514E94; padding-left: 10px; }
.article-body { font-size: 1.1rem; text-align: justify; }
.author-line { color: #888; font-size: 0.9em; border-bottom: 1px solid #eee; padding-bottom: 20px; }
</style>
