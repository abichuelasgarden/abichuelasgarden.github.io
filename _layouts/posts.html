---
layout: default
---
<article class="post-content">
  <header class="post-header">
    <span class="post-date">{{ page.date | date: "%d %b %Y" }}</span>
    <h1 class="post-title-main">{{ page.title | downcase }}</h1>
    {% if page.image %}
      <img src="{{ site.baseurl }}/{{ page.image }}" class="post-banner" alt="{{ page.title }}">
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>

<style>
  .post-content { max-width: 750px; margin: 0 auto; padding-top: 20px; }
  .post-date { color: #888; font-size: 0.9rem; text-transform: lowercase; }
  .post-title-main { font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px; margin: 10px 0 30px; line-height: 1.1; }
  .post-banner { width: 100%; border-radius: 35px; margin-bottom: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
  
  .post-body { font-size: 1.1rem; line-height: 1.7; color: #222; }
  .post-body h2 { font-weight: 800; margin-top: 40px; text-transform: lowercase; letter-spacing: -0.5px; }

  /* CONTENEDOR DE CÓDIGO CON BOTÓN */
  .code-wrapper {
    position: relative;
    margin: 25px 0;
  }

  pre { 
    background: #fdfdfd; 
    padding: 20px; 
    border-radius: 20px; 
    border: 1px solid #eee; 
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
  }

  .copy-button {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    text-transform: lowercase;
    font-weight: 600;
    transition: all 0.2s;
    opacity: 0; /* Invisible hasta que pasas el mouse */
  }

  .code-wrapper:hover .copy-button { opacity: 1; }
  .copy-button:hover { background: #000; color: #fff; border-color: #000; }
</style>

<script>
  // Script para añadir botones de copiar a cada bloque 'pre'
  document.querySelectorAll('pre').forEach((block) => {
    // Creamos un contenedor para el botón
    const wrapper = document.createElement('div');
    wrapper.className = 'code-wrapper';
    block.parentNode.insertBefore(wrapper, block);
    wrapper.appendChild(block);

    const button = document.createElement('button');
    button.innerText = 'copiar';
    button.className = 'copy-button';

    button.addEventListener('click', () => {
      const code = block.innerText;
      navigator.clipboard.writeText(code).then(() => {
        button.innerText = '¡copiado!';
        setTimeout(() => { button.innerText = 'copiar'; }, 2000);
      });
    });

    wrapper.appendChild(button);
  });
</script>
